{% extends 'layout.html' %}
{% block content %}
<body>
    <h1>Tracks</h1><br>
    <table border="1">
        <tr>
            <td>ID</td>
            <td>Track Name</td>
        </tr>
        {% for track in tracks %}
        <tr>
            <td>{{track.track_id}}</td>
            <td>{{track.track_name}}</td>
        </tr>
        {% endfor %}
    </table>
</body>
{% endblock %}
